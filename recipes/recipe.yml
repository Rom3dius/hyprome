---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: hyprome
description: Personal atomic hyprland fedora image.

base-image: quay.io/fedora-ostree-desktops/sway-atomic
image-version: 42

modules:
  - type: files
    files:
      - source: system
        destination: /

  # Remove sway
  - type: rpm-ostree
    remove:
      - sway
      - swaybg
      - swayidle
      - swaylock
      - sway-systemd
      - sway-config-fedora
      - sddm-wayland-sway
      - grimshot
      - xdg-desktop-portal-wlr # replace with the Hyprland backend

  # Install hyprland
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/solopasha/hyprland/repo/fedora-42/solopasha-hyprland-fedora-42.repo
    install:
      - hyprland # compositor
      - xdg-desktop-portal-hyprland # screenshare/screenshot backend
      - hyprpaper # wallpaper helper (optional)
      - hyprlock # lock screen   (optional)
      - hypridle # idle daemon   (optional)

  - type: default-flatpaks
    notify: true
    system:
      install:
        - com.brave.Browser
      remove:
        - org.gnome.eog
    user: {}

  - type: signing
